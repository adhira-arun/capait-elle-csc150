<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Y2K Preview | CAPITelle</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-main: #0000ff;
            --text-main: #00ff00;
            --primary: #ff00ff;
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Courier New', monospace; text-transform: uppercase; }
        .preview-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; border-bottom: 3px solid var(--primary); }
        .btn-back { color: #fff; text-decoration: underline; }
        .implement-btn { background: var(--primary); color: #fff; padding: 10px 20px; text-decoration: none; border: 3px outset var(--primary); }
        .card { background: rgba(255,255,255,0.1); border: 2px dashed var(--text-main); padding: 20px; }
    </style>
</head>
<body>
    <nav class="preview-nav">
        <div class="back-group">
            <a href="settings.html" class="btn-back"><< BACK</a>
            <span class="logo" style="pointer-events: none; color: var(--primary);">CAPIT_ELLE.v1</span>
        </div>
        <a href="index.html" class="implement-btn">[ INSTALL ]</a>
    </nav>
    <div class="container" style="margin-top: 40px;">
        <marquee scrollamount="10">LOBELIA'S DIGITAL VAULT >>> ACCESS GRANTED</marquee>
        <div class="card" style="margin-top: 50px; text-align: center;">
            <h2 style="font-size: 3rem; filter: drop-shadow(2px 2px var(--primary));">$15,420.00</h2>
            <p>Connection: SECURE</p>
        </div>
    </div>
</body>
</html>
