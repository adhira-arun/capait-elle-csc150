<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dark Academia Preview | CAPITelle</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-main: #1a1412;
            --text-main: #d4c4a8;
            --accent-soft: #3c2f2c;
            --primary: #5e4b46;
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Times New Roman', serif; }
        .preview-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: #261e1b; border-bottom: 1px solid var(--primary); }
        .back-group { display: flex; align-items: center; gap: 15px; }
        .btn-back { text-decoration: none; color: var(--text-main); border-bottom: 1px solid var(--text-main); }
        .implement-btn { border: 1px solid var(--text-main); color: var(--text-main); padding: 10px 25px; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav class="preview-nav">
        <div class="back-group">
            <a href="settings.html" class="btn-back">BACK</a>
            <span class="logo" style="pointer-events: none; letter-spacing: 4px;">CAPITELLE</span>
        </div>
        <a href="index.html" class="implement-btn">Implement Archive</a>
    </nav>
    <div class="container" style="margin-top: 80px; text-align: center;">
        <!-- Explicitly setting the color to the parchment-toned --text-main -->
        <h1 style="font-style: italic; color: var(--text-main);">The Ledger of Lobelia</h1> 
        <hr style="width: 50px; border-color: var(--primary); margin: 20px auto;">
        <div class="card" style="background: transparent; border: 1px solid var(--primary); max-width: 500px; margin: 40px auto; padding: 30px;">
            <p style="font-size: 0.9rem; text-transform: uppercase;">Current Holdings</p>
            <h2 style="font-size: 2.5rem;">$15,420</h2>
        </div>
    </div>
</body>
</html>
